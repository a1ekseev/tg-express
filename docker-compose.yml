services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tg_express
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d tg_express"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  migrate:
    image: tg-express-backend
    network_mode: host
    command: ["python", "-m", "alembic", "upgrade", "head"]
    env_file: .env

  bridge:
    image: tg-express-backend
    network_mode: host
    command: ["uvicorn", "app.workers:bridge", "--host", "0.0.0.0", "--port", "8080"]
    env_file: .env

  admin-api:
    image: tg-express-backend
    network_mode: host
    command: ["uvicorn", "app.workers:admin_api", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env

  frontend:
    image: tg-express-frontend
    network_mode: host
    depends_on:
      - admin-api

volumes:
  postgres_data:
  minio_data:
